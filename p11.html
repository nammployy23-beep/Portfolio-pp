<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Sarabun;
background:linear-gradient(#4fc3f7,#0d47a1);
color:white;
text-align:center;
display:flex;
justify-content:center;
}

.page{
width:100%;
max-width:390px;
min-height:100vh;
padding:40px 20px;
box-sizing:border-box;
}

.card{
background:white;
color:#0d47a1;
padding:25px;
border-radius:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

h1{
color:#0d47a1;
margin-bottom:15px;
}

.img{
border:3px dashed #ffeb3b;
height:250px;
margin:20px 0;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.quote{
margin-top:20px;
padding:15px;
background:#e3f2fd;
border-radius:12px;
font-style:italic;
font-weight:bold;
}

button{
margin-top:20px;
background:#0d47a1;
color:white;
padding:12px 25px;
border:none;
border-radius:10px;
font-size:15px;
}
</style>
</head>

<body>

<div class="page">
<div class="card">

<h1>ภาคผนวก</h1>

<div class="img">ใส่รูปภาพประกอบ / เกียรติบัตร</div>

<div class="quote">
"ไม่มีสิ่งใดอยู่เหนือกว่า“ความพยายาม”และ“ความอดทน”"
</div>

<button onclick="location.href='index.html'">กลับหน้าปก</button>

</div>
</div>

</body>
</html>
